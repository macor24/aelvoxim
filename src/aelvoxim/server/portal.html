<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelvoxim — Cognitive AI Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg-base);
    color:var(--text-primary);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  .site-wrap{max-width:1900px;margin:0 auto;width:100%;padding:0;display:flex;flex-direction:column;min-height:100vh}
  .header{padding:16px 0 0;display:flex;align-items:center;justify-content:space-between;margin-left:30px;margin-right:30px}
  .logo svg{width:122px;height:auto;display:block}
  .logo svg .st0{fill:var(--brand-500)}
  .header-actions{display:flex;gap:6px;align-items:center}
  .header-actions .user{font-size:13px;color:var(--text-muted)}
  .icon-btn{font-size:18px;padding:6px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;text-decoration:none;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;width:32px;height:32px}
  .icon-btn:hover{border-color:var(--brand-500);transform:translateY(-1px)}
  .lang-group{display:flex;gap:1px;background:var(--bg-surface);border-radius:6px;padding:2px}
  .lang-group button{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:4px 8px;border:none;border-radius:5px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .15s}
  .lang-group button.active{background:var(--gradient-brand);color:#fff}
  .lang-group button:hover:not(.active){color:var(--text-primary)}

  /* ── Hero ── */
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 0 60px}
  .hero-badge{display:none}
  .hero-logo{margin-bottom:28px}
  .hero-logo svg{height:108px;width:auto;display:block;margin:0 auto}
  .hero-logo svg .st0{fill:var(--brand-500);opacity:0.8}
  .hero h1{font-size:30px;font-weight:500;letter-spacing:-0.4px;line-height:1.2;margin-bottom:12px;max-width:520px;white-space:nowrap}
  .hero h1 .highlight{font-weight:600}
  .hero p{font-size:16px;line-height:1.6;color:var(--text-secondary);max-width:560px;margin:0 auto 36px}
  .hero-actions{display:flex;gap:14px;margin-bottom:56px;flex-wrap:wrap;justify-content:center}
  .hero-actions .btn{
    font-family:'Inter',sans-serif;font-size:16px;font-weight:500;
    padding:14px 32px;border-radius:10px;cursor:pointer;transition:all .2s;
    display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  }
  .hero-actions .btn.primary{
    background:var(--gradient-brand);color:#fff;border:none;
    box-shadow:0 4px 14px color-mix(in srgb,var(--brand-600) 25%,transparent);
  }
  .hero-actions .btn.primary:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 6px 20px color-mix(in srgb,var(--brand-600) 35%,transparent)}
  .hero-actions .btn.secondary{background:transparent;color:var(--text-primary);border:1.5px solid var(--border)}
  .hero-actions .btn.secondary:hover{border-color:var(--brand-500);background:color-mix(in srgb,var(--brand-500) 4%,transparent);transform:translateY(-2px)}

  /* ── Feature Cards ── */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:480px;margin:0 auto}
  .card{
    padding:32px 20px 24px;border-radius:12px;
    background:var(--bg-elevated);border:1px solid var(--border);
    text-align:center;transition:all .25s;cursor:pointer;
    text-decoration:none;color:inherit;display:block;
  }
  .card:hover{
    border-color:var(--brand-500);
    transform:translateY(-3px);
    box-shadow:0 8px 24px color-mix(in srgb,var(--brand-600) 10%,transparent);
  }
  .card .icon{font-size:32px;margin-bottom:14px}
  .card .name{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text-primary)}
  .card .desc{font-size:13px;color:var(--text-muted);line-height:1.6}
  .card .desc .tag{
    display:inline-block;padding:2px 10px;margin:2px;border-radius:6px;font-size:11px;
    background:color-mix(in srgb,var(--brand-500) 8%,transparent);color:var(--brand-500);
    border:1px solid color-mix(in srgb,var(--brand-500) 12%,transparent);
  }

  /* ── Footer ── */
  .footer{padding:32px 0 36px;text-align:center;font-size:13px;color:var(--text-muted)}

  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:color-mix(in srgb,var(--text-primary) 35%,transparent);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.active{display:flex}
  .modal{background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:32px;width:380px;max-width:90vw}
  .modal h2{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
  .modal .hint{font-size:14px;color:var(--text-muted);margin-bottom:20px}
  .modal .fg{margin-bottom:16px}
  .modal .fg label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:5px}
  .modal .fg input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-surface);color:var(--text-primary);font-size:15px;font-family:'Inter',sans-serif;outline:none;box-sizing:border-box;transition:border-color .15s}
  .modal .fg input:focus{border-color:var(--brand-500)}
  .modal .fg input::placeholder{color:var(--text-muted)}
  .modal .err{font-size:13px;color:#f87171;min-height:20px;text-align:center;margin-top:8px}
  .modal .success{font-size:13px;color:#4ade80;min-height:20px;text-align:center;margin-top:8px}
  .modal .btn-row{display:flex;gap:10px;margin-top:20px}
  .modal .btn-row button{flex:1;padding:11px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;transition:all .15s}
  .modal .btn-row .primary{background:var(--gradient-brand);color:#fff}
  .modal .btn-row .primary:hover{opacity:.9}
  .modal .btn-row .ghost{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
  .modal .btn-row .ghost:hover{color:var(--text-primary);border-color:var(--brand-500)}
  .modal .link-btn{font-size:13px;color:var(--brand-500);text-align:center;margin-top:14px;cursor:pointer;display:block}
  .modal .link-btn:hover{opacity:.8}
  .modal .back-link{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:10px;cursor:pointer}
  .modal .back-link:hover{color:var(--text-primary)}
  .modal .token-display{background:var(--bg-surface);border-radius:8px;padding:12px;font-family:monospace;font-size:13px;word-break:break-all;margin-bottom:16px;color:var(--text-secondary)}
  .modal .inline-switch{display:flex;gap:2px;background:var(--bg-surface);border-radius:8px;padding:3px;margin-bottom:20px}
  .modal .inline-switch button{flex:1;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;background:transparent;color:var(--text-muted);transition:all .15s}
  .modal .inline-switch button.active{background:var(--gradient-brand);color:#fff}
  .modal .inline-switch button:hover:not(.active){color:var(--text-primary)}

  @media(max-width:600px){
    .site-wrap{padding:0}
    .header{padding:20px 0 0;margin-left:16px;margin-right:16px}
    .logo svg{width:90px}
    .header-actions{gap:4px}
    .lang-group button{font-size:10px;padding:3px 6px}
    .hero{padding:36px 16px 32px}
    .hero-badge{font-size:11px;padding:4px 12px;margin-bottom:20px}
    .hero h1{font-size:28px;letter-spacing:-0.5px}
    .hero p{font-size:14px;margin-bottom:28px}
    .hero-actions{flex-direction:column;width:100%;gap:8px;margin-bottom:32px}
    .hero-actions .btn{justify-content:center;padding:12px 20px;font-size:15px}
    .grid{grid-template-columns:1fr;gap:8px;max-width:320px}
    .card{padding:20px 14px 16px}
    .card .icon{font-size:26px;margin-bottom:8px}
    .card .name{font-size:15px}
    .footer{padding:20px 16px 24px;font-size:12px}
    .modal{padding:24px 20px;width:100%;max-width:360px}
    .modal h2{font-size:18px}
    .modal .fg input{font-size:14px}
  }
</style>
<script>localStorage.setItem('ael_theme','light');document.documentElement.classList.remove('dark');</script>

}
</style>

<script>
var _lang=localStorage.getItem('ael_lang')||'en';
var I18N={en:{login:'Login',logout:'Logout',signup:'Sign Up',forgotPassword:'Forgot password?',noAccount:'No account? Sign up',hasAccount:'Already have an account? Login',backToLogin:'Back to Login',tagline:'More than a chatbot. A brain that learns.',headline1:'More than a chatbot,',headline2:'a brain that learns.',titleLine:'More than a chatbot, <span class="highlight">a brain that learns.</span>',subtitle:'A self-hosted AI cognitive engine with persistent memory, metacognition, self-learning, and expert orchestration. No GPU required.',ctaLogin:'Sign In',ctaRegister:'Create Account',cardBrain:'Chat AI Brain',cardApi:'API Platform',cardAdmin:'Control Panel',loginTitle:'Login',loginHint:'Sign in to access all features',registerTitle:'Sign Up',registerHint:'Create a new account',forgotTitle:'Reset Password',forgotHint:'Enter your email to receive a reset token',resetTitle:'Set New Password',resetHint:'Token verified for',emailLabel:'Email',passwordLabel:'Password',confirmLabel:'Confirm Password',resetTokenLabel:'Reset Token',newPasswordLabel:'New Password',sendToken:'Send Reset Token',resetBtn:'Reset Password',errRequired:'Email and password are required',errEmailRequired:'Email is required',errPwShort:'Password must be at least 6 characters',errPwMismatch:'Passwords do not match',errTokenRequired:'Token and new password are required',requesting:'Requesting...',resetting:'Resetting...',resetSuccess:'Password reset successful! Redirecting to login...',tokenGenerated:'Reset token generated.',footer:'Aelvoxim Self-hosted AI Cognitive Engine',loggedIn:'Logged in'},zh:{login:'登录',logout:'退出',signup:'注册',forgotPassword:'忘记密码？',noAccount:'没有账号？去注册',hasAccount:'已有账号？去登录',backToLogin:'返回登录',tagline:'不只是聊天机器人。一个会学习的大脑。',headline1:'不只是聊天机器人，',headline2:'一个会学习的大脑。',titleLine:'不只是聊天机器人， <span class="highlight">一个会学习的大脑。</span>',subtitle:'自托管 AI 认知引擎：持久记忆、元认知监控、自主学习、专家编排。无需 GPU。',ctaLogin:'登录',ctaRegister:'创建账号',cardBrain:'对话 AI 大脑',cardApi:'API 开放平台',cardAdmin:'控制面板',loginTitle:'登录',loginHint:'登录以访问全部功能',registerTitle:'注册',registerHint:'创建新账号',forgotTitle:'重置密码',forgotHint:'输入邮箱获取重置令牌',resetTitle:'设置新密码',resetHint:'令牌已验证，属于',emailLabel:'邮箱',passwordLabel:'密码',confirmLabel:'确认密码',resetTokenLabel:'重置令牌',newPasswordLabel:'新密码',sendToken:'发送重置令牌',resetBtn:'重置密码',errRequired:'邮箱和密码不能为空',errEmailRequired:'请输入邮箱',errPwShort:'密码至少6位',errPwMismatch:'两次输入的密码不一致',errTokenRequired:'令牌和新密码不能为空',requesting:'请求中...',resetting:'重置中...',resetSuccess:'密码重置成功！即将跳转登录...',tokenGenerated:'重置令牌已生成。',footer:'Aelvoxim 自托管 AI 认知引擎',loggedIn:'已登录'}};
function t(k){return(I18N[_lang]&&I18N[_lang][k])||I18N.en[k]||k}
function setLang(l){_lang=l;localStorage.setItem('ael_lang',l);document.getElementById('langEn').className=l==='en'?'lang-btn active':'lang-btn';document.getElementById('langZh').className=l==='zh'?'lang-btn active':'lang-btn';applyI18n();if(document.getElementById('authModal').classList.contains('active'))renderAuthModal()}
function applyI18n(){var w=document.createTreeWalker(document.body,4,null,false),n=[];while(w.nextNode())n.push(w.currentNode);n.forEach(function(n){if(n.nodeType===3&&n.nodeValue&&n.nodeValue.indexOf('@@')!==-1)n.nodeValue=n.nodeValue.replace(/@@(\w+)@@/g,function(m,k){return t(k)})});document.querySelectorAll('[data-i18n]').forEach(function(e){var k=e.getAttribute('data-i18n');if(k==='titleLine')e.innerHTML=t(k);else e.textContent=t(k)});document.getElementById('loginBtn').textContent=t('login');document.getElementById('logoutBtn').textContent=t('logout');var hu=document.getElementById('headerUser');if(_token&&hu&&!hu.textContent.includes('@'))hu.textContent=t('loggedIn');document.title=t('tagline')+' — Aelvoxim'}
var API_BASE='',_token=localStorage.getItem('ael_token')||'',_email=localStorage.getItem('ael_email')||'';
(function init(){document.getElementById('langEn').className=_lang==='en'?'lang-btn active':'lang-btn';document.getElementById('langZh').className=_lang==='zh'?'lang-btn active':'lang-btn';if(_token){document.getElementById('loginBtn').style.display='none';document.getElementById('logoutBtn').style.display='';document.getElementById('headerUser').textContent=_email||t('loggedIn')}applyI18n()})();
function showAuth(){_authMode='login';document.getElementById('authModal').classList.add('active');renderAuthModal()}
function showRegister(){_authMode='register';document.getElementById('authModal').classList.add('active');renderAuthModal()}
function closeAuth(){document.getElementById('authModal').classList.remove('active')}
var _authMode='login';
function renderAuthModal(){if(_authMode==='login')renderLogin();else if(_authMode==='register')renderRegister();else if(_authMode==='forgot')renderForgot();else if(_authMode==='reset')renderReset()}
function renderLogin(){document.getElementById('authModalContent').innerHTML='<h2>'+t('loginTitle')+'</h2><div class="hint">'+t('loginHint')+'</div><div class="fg"><label>'+t('emailLabel')+'</label><input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email"></div><div class="fg"><label>'+t('passwordLabel')+'</label><input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')submitLogin()"></div><div class="err" id="authErr"></div><div class="btn-row"><button class="primary" onclick="submitLogin()">'+t('login')+'</button></div><span class="link-btn" onclick="_authMode=\'forgot\';renderAuthModal()">'+t('forgotPassword')+'</span><span class="link-btn" onclick="_authMode=\'register\';renderAuthModal()">'+t('noAccount')+'</span>';setTimeout(function(){var e=document.getElementById('authEmail');if(e)e.focus()},100)}
function submitLogin(){var e=document.getElementById('authEmail').value.trim(),p=document.getElementById('authPassword').value,el=document.getElementById('authErr');if(!e||!p){el.textContent=t('errRequired');return}el.textContent=t('requesting');fetch(API_BASE+'/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.api_key){saveSession(d.api_key,d.email||e,d.plan||'');closeAuth()}else{el.textContent=d.detail||'Login failed'}}).catch(function(){el.textContent='Network error'})}
function renderRegister(){document.getElementById('authModalContent').innerHTML='<h2>'+t('registerTitle')+'</h2><div class="hint">'+t('registerHint')+'</div><div class="fg"><label>'+t('emailLabel')+'</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"></div><div class="fg"><label>'+t('passwordLabel')+'</label><input type="password" id="regPassword" placeholder="At least 6 characters" autocomplete="new-password"></div><div class="fg"><label>'+t('confirmLabel')+'</label><input type="password" id="regConfirm" placeholder="Repeat password" onkeydown="if(event.key===\'Enter\')submitRegister()"></div><div class="err" id="authErr"></div><div class="btn-row"><button class="primary" onclick="submitRegister()">'+t('signup')+'</button></div><span class="link-btn" onclick="_authMode=\'login\';renderAuthModal()">'+t('hasAccount')+'</span>';setTimeout(function(){var e=document.getElementById('regEmail');if(e)e.focus()},100)}
function submitRegister(){var e=document.getElementById('regEmail').value.trim(),p=document.getElementById('regPassword').value,c=document.getElementById('regConfirm').value,el=document.getElementById('authErr');if(!e||!p){el.textContent=t('errRequired');return}if(p.length<6){el.textContent=t('errPwShort');return}if(p!==c){el.textContent=t('errPwMismatch');return}el.textContent=t('requesting');fetch(API_BASE+'/v1/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p,plan:'community'})}).then(function(r){return r.json()}).then(function(d){if(d.api_key){saveSession(d.api_key,d.email||e,d.plan||'');closeAuth()}else{el.textContent=d.detail||'Registration failed'}}).catch(function(){el.textContent='Network error'})}
function renderForgot(){document.getElementById('authModalContent').innerHTML='<h2>'+t('forgotTitle')+'</h2><div class="hint">'+t('forgotHint')+'</div><div class="fg"><label>'+t('emailLabel')+'</label><input type="email" id="forgotEmail" placeholder="your@email.com" autocomplete="email" onkeydown="if(event.key===\'Enter\')submitForgot()"></div><div class="success" id="authSuccess"></div><div class="err" id="authErr"></div><div class="btn-row"><button class="primary" onclick="submitForgot()">'+t('sendToken')+'</button></div><span class="back-link" onclick="_authMode=\'login\';renderAuthModal()">'+t('backToLogin')+'</span>';setTimeout(function(){var e=document.getElementById('forgotEmail');if(e)e.focus()},100)}
var _resetToken='';function submitForgot(){var e=document.getElementById('forgotEmail').value.trim(),el=document.getElementById('authErr'),se=document.getElementById('authSuccess');if(!e){el.textContent=t('errEmailRequired');return}el.textContent='';se.textContent=t('requesting');fetch(API_BASE+'/v1/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e})}).then(function(r){return r.json()}).then(function(d){if(d.token){_resetToken=d.token;_resetEmail=e;se.textContent=t('tokenGenerated');el.textContent='';_authMode='reset';renderAuthModal()}else{se.textContent=d.message||'If the email exists, a reset link has been sent';el.textContent=''}}).catch(function(){el.textContent='Network error'})}
var _resetEmail='';function renderReset(){document.getElementById('authModalContent').innerHTML='<h2>'+t('resetTitle')+'</h2><div class="hint">'+t('resetHint')+' <strong>'+escHtml(_resetEmail)+'</strong></div><div class="fg"><label>'+t('resetTokenLabel')+'</label><input type="text" id="resetToken" value="'+escHtml(_resetToken)+'" placeholder="Paste token here"></div><div class="fg"><label>'+t('newPasswordLabel')+'</label><input type="password" id="resetPassword" placeholder="At least 6 characters" autocomplete="new-password" onkeydown="if(event.key===\'Enter\')submitReset()"></div><div class="fg"><label>'+t('confirmLabel')+'</label><input type="password" id="resetConfirm" placeholder="Repeat password"></div><div class="err" id="authErr"></div><div class="success" id="authSuccess"></div><div class="btn-row"><button class="primary" onclick="submitReset()">'+t('resetBtn')+'</button></div><span class="back-link" onclick="_authMode=\'login\';renderAuthModal()">'+t('backToLogin')+'</span>';setTimeout(function(){var e=document.getElementById('resetPassword');if(e)e.focus()},100)}
function submitReset(){var t=document.getElementById('resetToken').value.trim(),p=document.getElementById('resetPassword').value,c=document.getElementById('resetConfirm').value,el=document.getElementById('authErr'),se=document.getElementById('authSuccess');if(!t||!p){el.textContent=t('errTokenRequired');return}if(p.length<6){el.textContent=t('errPwShort');return}if(p!==c){el.textContent=t('errPwMismatch');return}el.textContent='';se.textContent=t('resetting');fetch(API_BASE+'/v1/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:_resetEmail,token:t,new_password:p})}).then(function(r){return r.json()}).then(function(d){if(d.message&&d.message.indexOf('successful')!==-1){se.textContent=t('resetSuccess');el.textContent='';setTimeout(function(){_authMode='login';renderAuthModal();var e=document.getElementById('authEmail');if(e)e.value=_resetEmail},1500)}else{el.textContent=d.detail||'Reset failed';se.textContent=''}}).catch(function(){el.textContent='Network error'})}
function saveSession(k,e,p){_token=k;_email=e;localStorage.setItem('ael_token',k);localStorage.setItem('ael_email',e);if(p)localStorage.setItem('ael_plan',p);document.getElementById('loginBtn').style.display='none';document.getElementById('logoutBtn').style.display='';document.getElementById('headerUser').textContent=_email||t('loggedIn')}
function doLogout(){_token='';_email='';localStorage.removeItem('ael_token');localStorage.removeItem('ael_email');localStorage.removeItem('ael_plan');document.getElementById('loginBtn').style.display='';document.getElementById('logoutBtn').style.display='none';document.getElementById('headerUser').textContent=''}
function escHtml(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
